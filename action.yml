name: MCPScan
description: Scan Model Context Protocol server configs and publish CI-friendly reports.
author: MCPScan

inputs:
  target:
    description: MCP config path, server command, or URL.
    required: true
  min-grade:
    description: Minimum grade required to pass CI.
    required: false
    default: B
  format:
    description: Report format to write as an artifact. Use markdown, sarif, json, html, or table.
    required: false
    default: markdown
  output:
    description: Output report path.
    required: false
    default: mcpscan-report.md
  upload-sarif:
    description: Generate and upload SARIF to GitHub code scanning.
    required: false
    default: "false"
  extra-args:
    description: Additional arguments passed to mcpscan scan.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Run MCPScan
      shell: bash
      run: |
        npx mcpscan scan "${{ inputs.target }}" \
          --ci \
          --min-grade "${{ inputs.min-grade }}" \
          --format "${{ inputs.format }}" \
          --output "${{ inputs.output }}" \
          ${{ inputs.extra-args }}
    - name: Generate SARIF
      if: ${{ inputs.upload-sarif == 'true' }}
      shell: bash
      run: |
        npx mcpscan scan "${{ inputs.target }}" \
          --format sarif \
          --output mcpscan.sarif \
          ${{ inputs.extra-args }}
    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: mcpscan.sarif
    - name: Upload MCPScan report artifact
      uses: actions/upload-artifact@v4
      with:
        name: mcpscan-report
        path: ${{ inputs.output }}
