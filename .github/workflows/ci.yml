name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run clean
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --omit=dev
      - run: npm pack --dry-run -w @mcpscan/shared
      - run: npm pack --dry-run -w mcpscan
